services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sasf
      POSTGRES_USER: sasf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sasf -d sasf"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command:
      - sh
      - -c
      - npm run --workspace=@sasf/api prisma -- migrate deploy --schema prisma/schema.prisma && npm run --workspace=@sasf/api start
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sasf:${POSTGRES_PASSWORD}@db:5432/sasf?schema=public
      PORT: 3001
      TZ: America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      API_URL: http://api:3001
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
